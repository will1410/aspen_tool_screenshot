<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Screenshot tool for Aspen Discovery</title>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.2/css/bootstrap.min.css'>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="css/custom.css">

  </head>
    
  <body>
  <html>

<header style="background-color: #c7cdd3;">
  <h2><a href="#">Screenshot tool for Aspen Discovery</a></h2>
</header>

<div style="background-color: #c7cdd3;">

  <form id="screenshot_form">

    <div class="form-group row">
      <label for="panel_title" class="col-1 col-form-label">Panel title</label>
      <div class="col-6">
        <input id="panel_title" name="panel_title" type="text" class="form-control">
      </div>
    </div>

    <div class="form-group row">
      <label for="image_link" class="col-1 col-form-label">Image URL</label>
      <div class="col-6">
        <input id="image_link" name="image_link" type="text" class="form-control">
      </div>
    </div>

    <div class="form-group row">
      <label for="image_alt_text" class="col-1 col-form-label">Image alt text</label>
      <div class="col-6">
        <input id="image_alt_text" name="image_alt_text" type="text" class="form-control">
      </div>
    </div>

    <div class="form-group row">
      <label for="title_options" class="col-1 col-form-label">Title options</label>
      <div class="col-6">
        <div>
          <fieldset>
            <div class="d-flex gap-4">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="panel_icon" id="image_icon" value="image" checked>
                <label class="form-check-label" for="image_icon">
                  Add image icon
                </label>
              </div>

              <div class="form-check">
                <input class="form-check-input" type="radio" name="panel_icon" id="camera_icon" value="camera">
                <label class="form-check-label" for="camera_icon">
                  Add camera icon
                </label>
              </div>

              <div class="form-check">
                <input class="form-check-input" type="radio" name="panel_icon" id="no_icon" value="none">
                <label class="form-check-label" for="no_icon">
                  No icon
                </label>
              </div>
            </div>
          </fieldset>
          <div>
            <input type="checkbox" id="screenshot_checkbox" name="screenshot_checkbox" value="screenshot_checkbox">
            <label for="screenshot" class="col-form-label">Prefix "Screenshot: " to the panel title</label>
          </div>
        </div>
      </div>
    </div>

    <div class="form-group row">
      <label for="width_options" class="col-1 col-form-label">Panel width</label>
      <div class="col-6">
      
          <fieldset>
            <div class="d-flex gap-4">

              <div class="form-check">
                <input class="form-check-input" type="radio" name="panel_width" id="width_full" value="12" checked>
                <label class="form-check-label" for="width_full">
                  Full width
                </label>
              </div>

              <div class="form-check">
                <input class="form-check-input" type="radio" name="panel_width" id="width_three_fourths" value="9">
                <label class="form-check-label" for="width_three_fourths">
                  75% width
                </label>
              </div>

              <div class="form-check">
                <input class="form-check-input" type="radio" name="panel_width" id="width_two_thirds" value="8">
                <label class="form-check-label" for="width_two_thirds">
                  Two thirds width
                </label>
              </div>

              <div class="form-check">
                <input class="form-check-input" type="radio" name="panel_width" id="width_half" value="6">
                <label class="form-check-label" for="width_half">
                  Half width
                </label>
              </div>

              <div class="form-check">
                <input class="form-check-input" type="radio" name="panel_width" id="width_one_thirds" value="4">
                <label class="form-check-label" for="width_one_thirds">
                  One third width
                </label>
              </div>

              <div class="form-check">
                <input class="form-check-input" type="radio" name="panel_width" id="width_one_quarter" value="3">
                <label class="form-check-label" for="width_one_quarter">
                  25% width
                </label>
              </div>

            </div>
          </fieldset>

      </div>
    </div>

    <div class="form-group row">
      <div class="offset-1 col-8">
        <button name="submit" type="submit" class="btn btn-primary" id="accordion_generator">Submit</button>
        <button name="copy" type="submit" class="btn btn-primary" id="copy_to_clipboard">Copy output to
          clipboard</button>
        <button name="reset" type="submit" class="btn btn-primary" id="reset">Reset form</button>
      </div>
    </div>

    <div class="form-group row">
      <label for="output" class="col-1 col-form-label">Output</label>
      <div class="col-6">
        <textarea id="output" name="output" cols="40" rows="10" class="form-control"></textarea>
      </div>
    </div>

  </form>

</div>

</html>
    <script src='https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js'></script><script  src="./script.js"></script>

  </body>
  
</html>
